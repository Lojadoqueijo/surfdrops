# Agendador PRINCIPAL do Radar do Swell (todos os lotes de dados).
# Motivo (2026-07-06): os cron jobs do Vercel Hobby falharam a primeira
# execução agendada (janela "flexível" de 1h largamente excedida — dados
# ficaram 12h obsoletos numa segunda-feira, o dia dos flips semanais).
# O GitHub Actions passa a fonte primária de agendamento; os crons do Vercel
# ficam como backup redundante — os endpoints são idempotentes (upsert de
# snapshots, flip_events com chave única, dedup de alertas), portanto correr
# em duplicado é inofensivo.
#
# Horários (UTC): cripto diário após o fecho da vela 00:00; ações/ETFs/índices
# em dias úteis após o fecho de Wall Street (20:00 verão / 21:00 inverno).
name: Radar — refresh agendado

on:
  schedule:
    - cron: "25 0 * * *"    # cripto (batch 0), todos os dias
    - cron: "50 21 * * 1-5" # ações fatias 0-2 (top 1500), dias úteis
    - cron: "15 22 * * 1-5" # ações fatias 3-5 (1501-3000), dias úteis
    - cron: "45 22 * * 1-5" # ETFs/commodities/índices (batch 2), dias úteis
    - cron: "0 3 * * *"     # VIGIA: frescura dos dados (falha → email do GitHub)
    - cron: "30 23 * * 1-5" # VIGIA: pós-fecho das ações, dias úteis
  workflow_dispatch: {} # corrida manual = refresh COMPLETO (recuperação)

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar os lotes do horário
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          call() {
            echo "== $1 =="
            # O endpoint é fail-closed: exige o Bearer (auditoria 1.2).
            curl -sS --max-time 320 -H "Authorization: Bearer ${CRON_SECRET}" "https://app.defisurfers.xyz/api/cron/refresh?$1" || true
            echo
          }
          vigia() {
            # /api/public/health: ok=false quando alguma classe excede o limiar
            # (cripto 26h; ações/ETFs 80h). Falhar o job faz o GitHub enviar
            # email ao dono do repo — monitorização sem custos.
            H=$(curl -sS --max-time 60 "https://app.defisurfers.xyz/api/public/health")
            echo "$H"
            echo "$H" | grep -q '"ok":true' || { echo "::error::Dados do Radar OBSOLETOS — correr o workflow manualmente (Run workflow) para recuperar"; exit 1; }
          }
          case "${{ github.event.schedule }}" in
            "25 0 * * *")
              call "batch=0" ;;
            "50 21 * * 1-5")
              call "batch=1&slice=0"; call "batch=1&slice=1"; call "batch=1&slice=2" ;;
            "15 22 * * 1-5")
              call "batch=1&slice=3"; call "batch=1&slice=4"; call "batch=1&slice=5" ;;
            "45 22 * * 1-5")
              call "batch=2" ;;
            "0 3 * * *"|"30 23 * * 1-5")
              vigia ;;
            *)
              # workflow_dispatch: recuperação total, tudo em sequência
              call "batch=0"
              for s in 0 1 2 3 4 5; do call "batch=1&slice=$s"; done
              call "batch=2" ;;
          esac
